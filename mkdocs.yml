site_name: "Générer un script Python avec des outils d'IA"
site_url: "https://stahe.github.io/python-ia-sept2025/"
site_description: "Tutoriel complet pour apprendre à générer des scripts Python automatisés grâce aux outils d'IA."
site_author: "Serge Tahé"
use_directory_urls: false

repo_url: "https://github.com/stahe/python-ia-sept2025"
repo_name: "GitHub"

theme:
  name: material
  custom_dir: overrides
  features:
    - navigation.sections
    - navigation.indexes
    - toc.integrate
    - navigation.top

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Passer en mode sombre

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Passer en mode clair

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - admonition
  - attr_list

plugins:
  - search
  # - social:    <--- DÉSACTIVÉ POUR ÉVITER L'ERREUR CAIROSVG/WINDOWS
  #     cards_layout_options:
  #       background_color: "#009688"

extra:
  analytics:
    provider: google
    property: G-EBZC3JVJNR  # <--- REMETTEZ VOTRE ID ICI

nav:
  - "1. Introduction": Introduction.md
  - "2. Les trois probl\u00e8mes \u00e9tudi\u00e9s et les r\u00e9sultats": Les trois problèmes étudiés et les résultats.md
  - "3. Installation d'un environnement de travail": Installation d'un environnement de travail.md
  - "4. R\u00e9solution des trois probl\u00e8mes avec Google Gemini": Résolution des trois problèmes avec Google Gemini.md
  - "5. R\u00e9solution des trois probl\u00e8mes avec ChatGPT": Résolution des trois problèmes avec ChatGPT.md
  - "6. R\u00e9solution des trois probl\u00e8mes avec Grok": Résolution des trois problèmes avec Grok.md
  - "7. R\u00e9solution des trois probl\u00e8mes avec ClaudeAI": Résolution des trois problèmes avec ClaudeAI.md
  - "8. R\u00e9solution des trois probl\u00e8mes avec MistralAI": Résolution des trois problèmes avec MistralAI.md
  - "9. R\u00e9solution des trois probl\u00e8mes avec DeepSeek": Résolution des trois problèmes avec DeepSeek.md
  - "10. R\u00e9solution des trois probl\u00e8mes avec Perplexity": Résolution des trois problèmes avec Perplexity.md
  - "11. Conclusion": Conclusion.md

