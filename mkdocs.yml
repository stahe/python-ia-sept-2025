site_name: "Générer un script Python avec des outils d'IA"
site_url: ""
use_directory_urls: false

theme:
  name: material
  custom_dir: overrides  # Activation du dossier pour les partiels personnalisés (footer, etc.)
  features:
    - navigation.sections
    - navigation.indexes
    - toc.integrate

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - admonition
  - attr_list

# Configuration Google Analytics
extra:
  analytics:
    provider: google
    property: G-XXXXXXXXXX  # Pensez à remettre votre ID

